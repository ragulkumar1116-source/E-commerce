<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - nvm Tech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/tablet.css">
  <link rel="stylesheet" href="../assets/css/mobile.css">
</head>
<body>

  <div class="page-loader" id="pageLoader">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <i class="bi bi-lightning-charge-fill"></i>
        <h3><span id="navBrandName">nvm Tech</span></h3>
        <p class="text-muted">Create your account</p>
      </div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="regName" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="john@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input type="tel" class="form-control" id="regPhone" placeholder="9876543210" pattern="[6-9][0-9]{9}" required>
          <small class="text-muted">10-digit Indian mobile format</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="regConfirmPassword" placeholder="••••••••" required>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="regTerms" required>
          <label class="form-check-label small" for="regTerms">I agree to the Terms & Conditions</label>
        </div>
        <button type="submit" class="btn btn-primary-gradient w-100 py-2.5">Register</button>
      </form>

      <div class="auth-divider">or</div>

      <button type="button" class="btn-google" id="btnGoogle">
        <svg style="height:18px" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
          <g transform="matrix(1, 0, 0, 1, 0, 0)">
            <path d="M21.35,11.1H12v2.7h5.38C17.15,15.11,15,16.5,12,16.5c-3.03,0-5.61-2.08-6.53-4.88-.23-.69-.36-1.43-.36-2.2s.13-1.51.36-2.2c.92-2.8,3.5-4.88,6.53-4.88,1.64,0,3.13.6,4.29,1.57l2.02-2.02C16.51,2.3,14.41,1.5,12,1.5,7.15,1.5,3.03,4.27,1.11,8.3c-.72,1.51-1.11,3.2-1.11,5s.39,3.49,1.11,5c1.92,4.03,6.04,6.8,10.89,6.8,4.7,0,8.68-3.08,9.98-7.2.3-.9.46-1.87.46-2.9C22.44,13.91,22.04,12.3,21.35,11.1Z" fill="#EA4335" />
            <path d="M12,16.5c3.03,0,5.38-1.39,5.38-2.7H12v2.7Z" fill="#34A853" />
            <path d="M22.44,15c-1.3,4.12-5.28,7.2-9.98,7.2-4.85,0-8.97-2.77-10.89-6.8l2.2-1.7C4.69,16.42,7.27,18,12,18,14.41,18,16.51,17.2,18.31,15.89Z" fill="#4285F4" />
            <path d="M22.44,15H18.31l3.15-3.15C22.04,12.87,22.3,13.9,22.44,15Z" fill="#FBBC05" />
          </g>
        </svg>
        Sign up with Google
      </button>

      <div class="text-center mt-4 text-muted small">
        Already have an account? <a href="login.html">Login here</a>
      </div>
      <div class="text-center mt-2">
        <a href="../index.html" class="small text-secondary"><i class="bi bi-arrow-left"></i> Back to store</a>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
