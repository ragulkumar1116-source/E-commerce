<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/tablet.css">
  <link rel="stylesheet" href="../assets/css/mobile.css">
</head>
<body>
  
  <div class="page-loader" id="pageLoader">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="admin-wrapper">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="sidebar-brand">
        <i class="bi bi-lightning-charge-fill"></i>
        <h4 id="sidebarBrandName">E&P SMART</h4>
        <small class="opacity-75">Admin Control</small>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link "><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
<a href="products.html" class="sidebar-link active"><i class="bi bi-box-seam"></i> <span>Products</span></a>
<a href="add-product.html" class="sidebar-link "><i class="bi bi-plus-circle"></i> <span>Add Product</span></a>
<a href="categories.html" class="sidebar-link "><i class="bi bi-tags"></i> <span>Categories</span></a>
<a href="orders.html" class="sidebar-link "><i class="bi bi-receipt"></i> <span>Orders</span></a>
        <a href="couriers.html" class="sidebar-link"><i class="bi bi-truck"></i> <span>Courier Management</span></a>
<a href="customers.html" class="sidebar-link "><i class="bi bi-people"></i> <span>Customers</span></a>
<a href="payments.html" class="sidebar-link "><i class="bi bi-credit-card"></i> <span>Payments</span></a>
<a href="reports.html" class="sidebar-link "><i class="bi bi-bar-chart-line"></i> <span>Reports</span></a>
<a href="notifications.html" class="sidebar-link "><i class="bi bi-bell"></i> <span>Notifications</span></a>
<a href="settings.html" class="sidebar-link "><i class="bi bi-gear"></i> <span>Settings</span></a>

      </nav>
      <div class="sidebar-footer">
        <a href="#" id="adminLogout" class="sidebar-link text-danger"><i class="bi bi-box-arrow-left"></i> <span>Logout</span></a>
      </div>
    </aside>

    <!-- Sidebar Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-link d-lg-none p-0 text-dark" id="sidebarToggle"><i class="bi bi-list fs-3"></i></button>
          <h4 class="admin-page-title mb-0 fw-bold">Edit Product</h4>
        </div>
        <div class="admin-header-actions">
          <div class="dropdown">
            <button class="btn btn-link position-relative text-dark p-0" data-bs-toggle="dropdown">
              <i class="bi bi-bell fs-5"></i>
              <span class="notification-dot" id="notifDot" style="display:none"></span>
            </button>
            <div class="dropdown-menu dropdown-menu-end notification-dropdown shadow-lg p-2" id="notifDropdown" style="width:300px; max-height:350px; overflow-y:auto;">
              <div class="dropdown-header">System Notifications</div>
              <div id="notifList"><p class="text-muted p-3 mb-0 small text-center">No alerts</p></div>
            </div>
          </div>
          <div class="admin-user-info dropdown">
            <button class="btn btn-link dropdown-toggle text-dark fw-semibold" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle fs-5 me-1 text-primary"></i> <span id="adminName">Admin</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-md">
              <li><a class="dropdown-item" href="settings.html"><i class="bi bi-gear"></i> Settings</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" id="adminLogoutHeader"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
            </ul>
          </div>
        </div>
      </header>

      <div class="admin-content">
        
  <div class="card p-4 shadow-sm border-light">
    <form id="editProductForm">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Product Name</label>
          <input type="text" class="form-control" id="pName" required>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">SKU Identifier</label>
          <input type="text" class="form-control" id="pSku" required>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Brand Manufacturer</label>
          <input type="text" class="form-control" id="pBrand" required>
        </div>
        
        <div class="col-md-4">
          <label class="form-label fw-bold">Category</label>
          <select class="form-select" id="pCat" required>
            <!-- Loaded categories -->
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Sub Category</label>
          <input type="text" class="form-control" id="pSubCat">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">HSN Code</label>
          <input type="text" class="form-control" id="pHsn">
        </div>

        <div class="col-md-3">
          <label class="form-label fw-bold">Base Retail Price</label>
          <input type="number" class="form-control" id="pPrice" required>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Discount Price (Selling Price)</label>
          <input type="number" class="form-control" id="pDiscountPrice">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">GST tax percentage</label>
          <select class="form-select" id="pGst" required>
            <option value="18" selected>18% GST (Standard)</option>
            <option value="28">28% GST</option>
            <option value="12">12% GST</option>
            <option value="5">5% GST</option>
            <option value="0">0% GST</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Stock Quantity Available</label>
          <input type="number" class="form-control" id="pStock" required>
        </div>

        <div class="col-md-3">
          <label class="form-label fw-bold">Unit Weight</label>
          <input type="text" class="form-control" id="pWeight" placeholder="e.g. 500g, 1.2kg">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Shipping Charge (₹)</label>
          <input type="number" class="form-control" id="pShipping" placeholder="e.g. 50, empty for default" min="0" step="any">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Warranty Period</label>
          <input type="text" class="form-control" id="pWarranty" placeholder="e.g. 1 Year Manufacturer Warranty">
        </div>

        <div class="col-12">
          <label class="form-label fw-bold">Product Description</label>
          <textarea class="form-control" id="pDesc" rows="4" required></textarea>
        </div>
        
        <div class="col-12">
          <label class="form-label fw-bold">Technical Specifications (Key:Value per line or JSON)</label>
          <textarea class="form-control" id="pSpecs" rows="4" placeholder="e.g. Voltage: 230V AC\nAmperes: 16A\nPoles: Double Pole (DP)"></textarea>
        </div>

        <!-- Images section -->
        <div class="col-12 border-top pt-3 mt-3">
          <h6 class="fw-bold mb-3 text-secondary">Images External URLs Only (No files)</h6>
          <div class="row g-2">
            <div class="col-md-4 mb-2"><input type="text" class="form-control" id="pImg1" placeholder="Image URL 1 (Primary)" required></div>
            <div class="col-md-4 mb-2"><input type="text" class="form-control" id="pImg2" placeholder="Image URL 2"></div>
            <div class="col-md-4 mb-2"><input type="text" class="form-control" id="pImg3" placeholder="Image URL 3"></div>
            <div class="col-md-4 mb-2"><input type="text" class="form-control" id="pImg4" placeholder="Image URL 4"></div>
            <div class="col-md-4 mb-2"><input type="text" class="form-control" id="pImg5" placeholder="Image URL 5"></div>
          </div>
        </div>

        <div class="col-md-6 form-check ms-3 mt-3">
          <input type="checkbox" class="form-check-input" id="pFeatured">
          <label class="form-check-label" for="pFeatured">Show on storefront Featured grid</label>
        </div>
        <div class="col-md-6 form-check ms-3">
          <input type="checkbox" class="form-check-input" id="pBestSeller">
          <label class="form-check-label" for="pBestSeller">Mark as Best Seller product</label>
        </div>

        <div class="col-12 border-top pt-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">Update Product</button>
          <a href="products.html" class="btn btn-secondary px-4">Cancel</a>
        </div>
      </div>
    </form>
  </div>

      </div>
    </main>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/common.js"></script>
  <script>
    // Sidebar mobile toggle
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
      document.getElementById('adminSidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    });
    document.getElementById('sidebarOverlay')?.addEventListener('click', () => {
      document.getElementById('adminSidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });
    
    // Auth role protection & display admin details
    getCurrentUser().then(user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      return getUserRole(user.uid).then(role => {
        if (role !== 'admin') {
          showToast('Unauthorized access redirecting...', 'error');
          setTimeout(() => window.location.href = '../index.html', 1500);
        } else {
          document.getElementById('adminName').textContent = user.displayName || 'Admin';
        }
      });
    });

    const triggerLogout = (e) => {
      e.preventDefault();
      showLoader();
      auth.signOut().then(() => window.location.href = 'login.html');
    };
    document.getElementById('adminLogout')?.addEventListener('click', triggerLogout);
    document.getElementById('adminLogoutHeader')?.addEventListener('click', triggerLogout);
  </script>
  <script src="../admin-js/products.js?v=1.1"></script>
</body>
</html>
