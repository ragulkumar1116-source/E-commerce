<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - nvm Tech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  
  <div class="page-loader" id="pageLoader">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <i class="bi bi-shield-lock-fill"></i>
        <h3><span>nvm Tech</span></h3>
        <p class="text-danger fw-bold small uppercase">Admin Gateway Panel</p>
      </div>

      <form id="adminLoginForm">
        <div class="mb-3">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-control" id="adminEmail" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="adminPassword" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 py-2.5">Login Control Center</button>
      </form>
      <div class="text-center mt-3">
        <a href="../index.html" class="small text-secondary"><i class="bi bi-arrow-left"></i> Customer store</a>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <!-- Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      hideLoader();
      console.log("Admin login page loaded. Firebase initialized.");
      document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = sanitizeInput(document.getElementById('adminEmail').value);
        const pass = document.getElementById('adminPassword').value;

        showLoader();
        console.log("Attempting sign-in for email:", email);
        auth.signInWithEmailAndPassword(email, pass).then((res) => {
          console.log("Authentication successful, UID:", res.user.uid);
          return getUserRole(res.user.uid);
        }).then(role => {
          hideLoader();
          console.log("getUserRole resolved role:", role);
          if (role !== 'admin') {
            console.warn("User role is not admin. Access denied.");
            showToast('Access denied: Unauthorized role.', 'error');
            auth.signOut();
          } else {
            console.log("Access granted. Redirecting to dashboard.html in 1 second...");
            showToast('Welcome to Control Center!', 'success');
            setTimeout(() => {
              console.log("Executing redirect to dashboard.html");
              window.location.href = 'dashboard.html';
            }, 1000);
          }
        }).catch(err => {
          hideLoader();
          console.error("Sign-in error:", err);
          showToast(err.message, 'error');
        });
      });
    });
  </script>
</body>
</html>
