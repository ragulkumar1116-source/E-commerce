<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Registration - E&P SMART</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../assets/css/tablet.css">
  <link rel="stylesheet" href="../assets/css/mobile.css">
</head>
<body>

  <div class="page-loader" id="pageLoader">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <i class="bi bi-lightning-charge-fill text-primary"></i>
        <h3><span id="lblBrandName">E&P SMART</span></h3>
        <p class="text-muted fw-bold">Admin Portal Registration</p>
        <span class="badge bg-danger mb-3">Admin Account Creator</span>
      </div>

      <form id="adminRegisterForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="regName" placeholder="Admin Name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="admin@epsmart.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input type="tel" class="form-control" id="regPhone" placeholder="9876543210" pattern="[6-9][0-9]{9}" required>
          <small class="text-muted">10-digit mobile number</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="regConfirmPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary-gradient w-100 py-2.5"><i class="bi bi-person-plus-fill me-1"></i> Register Admin Account</button>
      </form>

      <div class="text-center mt-4 text-muted small">
        Already have an account? <a href="login.html">Login here</a>
      </div>
      <div class="text-center mt-2">
        <a href="../index.html" class="small text-secondary"><i class="bi bi-arrow-left"></i> Back to store</a>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/common.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('adminRegisterForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = sanitizeInput(document.getElementById('regName').value);
        const email = sanitizeInput(document.getElementById('regEmail').value);
        const phone = sanitizeInput(document.getElementById('regPhone').value);
        const pass = document.getElementById('regPassword').value;
        const confPass = document.getElementById('regConfirmPassword').value;

        if (!name || !email || !phone || !pass) {
          showToast('All fields are required', 'warning');
          return;
        }

        if (!validateEmail(email)) {
          showToast('Please enter a valid email address', 'warning');
          return;
        }

        if (!validatePhone(phone)) {
          showToast('Please enter a valid 10-digit mobile number', 'warning');
          return;
        }

        if (pass.length < 6) {
          showToast('Password must be at least 6 characters long', 'warning');
          return;
        }

        if (pass !== confPass) {
          showToast('Passwords do not match', 'warning');
          return;
        }

        showLoader();
        auth.createUserWithEmailAndPassword(email, pass)
          .then((result) => {
            const user = result.user;
            return user.updateProfile({ displayName: name }).then(() => {
              // Save user profile as ADMIN in database
              return db.ref(`users/${user.uid}`).set({
                name: name,
                email: email,
                phone: phone,
                role: 'admin',
                createdAt: firebase.database.ServerValue.TIMESTAMP
              });
            });
          })
          .then(() => {
            hideLoader();
            showToast('Admin Account registered successfully!', 'success');
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1500);
          })
          .catch((err) => {
            hideLoader();
            if (err.code === 'auth/email-already-in-use') {
              showToast('This email is already in use by Firebase Auth. If you deleted its database profile, just Login to restore it.', 'warning');
            } else {
              showToast(err.message, 'error');
            }
          });
      });
    });
  </script>
</body>
</html>
